<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PassWall2 Watchdog — Health</title>
<style>
	:root {
		--bg:        #1c1f24;
		--card:      #262a31;
		--card-2:    #2f343c;
		--text:      #e6e8eb;
		--muted:     #9aa0a6;
		--border:    #3a3f48;
		--ok-bg:     #1f6e3a;
		--ok-fg:     #d4f3df;
		--warn-bg:   #8a6500;
		--warn-fg:   #fff3cd;
		--danger-bg: #8a1c2a;
		--danger-fg: #ffd6dc;
		--neutral-bg:#3a3f48;
		--neutral-fg:#cbd0d6;
	}
	@media (prefers-color-scheme: light) {
		:root {
			--bg:        #f5f5f5;
			--card:      #ffffff;
			--card-2:    #fafafa;
			--text:      #1a1a1a;
			--muted:     #666;
			--border:    #ddd;
			--ok-bg:     #d4edda;
			--ok-fg:     #1a7f3c;
			--warn-bg:   #fff3cd;
			--warn-fg:   #856404;
			--danger-bg: #f8d7da;
			--danger-fg: #842029;
			--neutral-bg:#e9ecef;
			--neutral-fg:#495057;
		}
	}
	* { box-sizing: border-box; }
	html, body {
		margin: 0; padding: 0;
		font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
		background: var(--bg); color: var(--text);
		font-size: 14px;
	}
	.wrap {
		max-width: 720px;
		margin: 20px auto;
		padding: 0 16px;
	}
	.card {
		background: var(--card);
		border: 1px solid var(--border);
		border-radius: 6px;
		padding: 16px 18px;
		margin-bottom: 12px;
	}
	h1 {
		font-size: 16px;
		font-weight: 600;
		margin: 0 0 12px 0;
		color: var(--text);
	}
	.subtitle {
		font-size: 12px;
		color: var(--muted);
		margin-bottom: 14px;
	}
	table {
		width: 100%;
		border-collapse: collapse;
	}
	td {
		padding: 8px 6px;
		vertical-align: top;
		border-bottom: 1px solid var(--border);
	}
	tr:last-child td { border-bottom: none; }
	td.lbl {
		width: 36%;
		color: var(--muted);
		font-weight: 600;
	}
	td.val { color: var(--text); }
	.badge {
		display: inline-block;
		padding: 4px 12px;
		border-radius: 4px;
		font-weight: 600;
		font-size: 13px;
		line-height: 1.4;
	}
	.badge.ok      { background: var(--ok-bg);      color: var(--ok-fg); }
	.badge.warn    { background: var(--warn-bg);    color: var(--warn-fg); }
	.badge.danger  { background: var(--danger-bg);  color: var(--danger-fg); }
	.badge.neutral { background: var(--neutral-bg); color: var(--neutral-fg); }
	code {
		font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
		font-size: 12.5px;
		background: var(--card-2);
		padding: 1px 5px;
		border-radius: 3px;
		word-break: break-all;
	}
	details {
		margin-top: 6px;
		padding-top: 4px;
	}
	details summary {
		cursor: pointer;
		padding: 6px 0;
		font-weight: 600;
		color: var(--muted);
		font-size: 13px;
		user-select: none;
	}
	details summary:hover { color: var(--text); }
	details table { margin-top: 4px; }
	details td { padding: 6px; font-size: 12.5px; }
	details td.lbl { width: 35%; }
	details td.val { font-family: ui-monospace, monospace; word-break: break-all; }
	.warn-line {
		margin-top: 10px;
		padding: 10px 12px;
		background: var(--warn-bg);
		color: var(--warn-fg);
		border-radius: 4px;
		font-size: 13px;
	}
	.foot {
		text-align: right;
		font-size: 11px;
		color: var(--muted);
		margin-top: 6px;
	}
	.err {
		padding: 12px;
		background: var(--danger-bg);
		color: var(--danger-fg);
		border-radius: 4px;
	}
</style>
</head>
<body>
<div class="wrap">
	<div class="card">
		<h1>PassWall2 Watchdog — Health</h1>
		<div class="subtitle">Live status. Updates every 5 seconds.</div>
		<div id="root">Loading…</div>
		<div class="foot" id="foot"></div>
	</div>
</div>
<script>
(function() {
	'use strict';
	var ENDPOINT       = '/cgi-bin/pw2health';
	var LIVE_ENDPOINT  = '/cgi-bin/pw2live';
	var REFRESH_MS     = 5000;

	/* ── Live probe state ────────────────────────────────────────────────
	 * __pw2live holds the most recent JSON from /cgi-bin/pw2live.
	 * Until the first probe returns, __pw2live_pending stays true and we
	 * paint a yellow "Probing…" badge instead of stale status_json data.
	 * The probe runs on an adaptive timer:
	 *   • 3s  while last_switch / last_pw2_restart < 90s (post-rotation)
	 *   • 30s when document.hidden
	 *   • 15s after 3 consecutive errors
	 *   • 5s  otherwise.
	 * Activity hints are refreshed on every status_json fetch via tick().
	 */
	var __pw2live           = null;
	var __pw2live_pending   = true;
	var __pw2live_hint      = { last_switch: 0, last_pw2_restart: 0 };
	var __pw2live_errStreak = 0;
	var __pw2live_timer     = null;

	function pickLiveInterval() {
		var now = Math.floor(Date.now() / 1000);
		var ls  = Number(__pw2live_hint.last_switch || 0);
		var lr  = Number(__pw2live_hint.last_pw2_restart || 0);
		var fresh = Math.max(ls, lr);
		if (fresh > 0 && (now - fresh) < 90) return 3000;
		if (document.hidden) return 30000;
		if (__pw2live_errStreak >= 3) return 15000;
		return 5000;
	}

	function probeOnce() {
		fetch(LIVE_ENDPOINT, { cache: 'no-store' })
			.then(function(r) {
				if (!r.ok) throw new Error('HTTP ' + r.status);
				return r.json();
			})
			.then(function(j) {
				__pw2live = j;
				__pw2live.received_at = Math.floor(Date.now() / 1000);
				__pw2live_pending  = false;
				__pw2live_errStreak = 0;
			})
			.catch(function() {
				__pw2live_errStreak++;
				/* keep last good __pw2live; pickProxyStatus tolerates staleness */
			})
			.then(function() {
				if (__pw2live_timer !== null) clearTimeout(__pw2live_timer);
				__pw2live_timer = setTimeout(probeOnce, pickLiveInterval());
			});
	}

	document.addEventListener('visibilitychange', function() {
		if (!document.hidden) {
			/* Re-arm immediately when user comes back to the tab. */
			if (__pw2live_timer !== null) clearTimeout(__pw2live_timer);
			probeOnce();
		}
	});

	function el(tag, attrs, kids) {
		var e = document.createElement(tag);
		if (attrs) for (var k in attrs) {
			if (k === 'class') e.className = attrs[k];
			else e.setAttribute(k, attrs[k]);
		}
		if (kids) (Array.isArray(kids) ? kids : [kids]).forEach(function(k) {
			if (k == null) return;
			if (typeof k === 'string') e.appendChild(document.createTextNode(k));
			else e.appendChild(k);
		});
		return e;
	}

	function fmtTs(t) {
		t = Number(t || 0);
		if (!t) return '-';
		return new Date(t * 1000).toLocaleString();
	}

	function pickPwState(s) {
		var r = s.passwall_running || '';
		if (r === 'true')  return ['\u{1F7E2} Running', 'ok'];
		if (r === 'false') return ['\u{1F534} Stopped', 'danger'];
		return ['Unknown', 'neutral'];
	}

	function pickWdState(s) {
		if (s.running === 'true') return ['\u{1F7E2} Running', 'ok'];
		var lastScan = Number(s.last_scan_ts || 0);
		var nowSec   = Math.floor(Date.now() / 1000);
		if (lastScan > 0 && (nowSec - lastScan) < 300) {
			return ['\u{1F7E1} Starting…', 'warn'];
		}
		return ['\u{1F534} Stopped', 'danger'];
	}

	function pickProxyStatus(s) {
		var en   = s.proxy_check_enabled || '0';
		var st   = s.proxy_check_state   || '';
		var ip   = s.proxy_check_ip      || '';
		var node = s.proxy_check_node_label || '';
		var last = Number(s.last_switch || 0);
		var now  = Math.floor(Date.now() / 1000);
		var pw   = s.passwall_default_node || s.current_node || '';
		var alive = s.passwall_alive || '';
		var fb   = s.fallback_action || 'blackhole';

		/* ── Live-probe override ──────────────────────────────────────
		 * Prefer the browser-side probe when fresh (<10s).
		 * Eliminates phase-shift between status_json (refreshed every 120s
		 * by the daemon) and the actual proxy state.
		 */
		if (__pw2live_pending) {
			return ['\u{1F7E1} Probing\u2026', 'warn'];
		}
		if (__pw2live && Number(__pw2live.received_at || 0) > 0
				&& (now - Number(__pw2live.received_at)) <= 10) {
			var lst = __pw2live.state || '';
			if (lst) { st = lst; }
			if (__pw2live.ip)         { ip   = __pw2live.ip; }
			if (__pw2live.node_label) { node = __pw2live.node_label; }
		}

		if (alive === 'false')                  return ['\u{1F534} Proxy engine not running',     'danger'];
		if (en !== '1')                         return ['Check disabled',                        'neutral'];
		if (!pw)                                return ['No node configured',                    'neutral'];
		if (st === 'blackhole')                 return ['\u{1F534} Blocked (killswitch active)', 'danger'];
		if (st === 'proxy_no_204')              return ['\u{1F534} Proxy unreachable',           'danger'];
		if (st === 'proxy_down')                return ['\u{1F534} Proxy engine not running',    'danger'];
		if (st === 'direct') {
			if (fb === 'direct')               return ['\u26A0\uFE0F Leaking direct (by design)', 'warn'];
			return ['\u{1F534} Leaking direct', 'danger'];
		}
		if (st === 'no_response')               return ['\u{1F534} No response',                 'danger'];
		if (st === 'proxy_ok' && ip && !node)   return ['\u26A0\uFE0F Working (unrecognised exit)', 'warn'];
		if (st === 'proxy_ok')                  return ['\u{1F7E2} Working',                     'ok'];
		if (last > 0 && (now - last) < 90)      return ['Checking\u2026',                        'warn'];
		if (!st || st === 'unknown')            return ['Pending check\u2026',                   'neutral'];
		return ['Unknown state', 'neutral'];
	}

	var prevDetailsOpen = false;

	function render(s) {
		var root = document.getElementById('root');
		var prev = root.querySelector('details');
		if (prev) prevDetailsOpen = prev.open;

		var pwSt    = pickPwState(s);
		var wdSt    = pickWdState(s);
		var prSt    = pickProxyStatus(s);
		var pwLabel = s.passwall_default_label || s.current_label || s.passwall_default_node || '-';
		var rxIp    = s.proxy_check_ip || '';
		var rxNode  = s.proxy_check_node_label || '';
		/* Prefer live-probe IP/node when fresh, so the subline matches the badge. */
		var nowSec_ = Math.floor(Date.now() / 1000);
		if (__pw2live && Number(__pw2live.received_at || 0) > 0
				&& (nowSec_ - Number(__pw2live.received_at)) <= 10) {
			if (__pw2live.ip)         { rxIp   = __pw2live.ip; }
			if (__pw2live.node_label) { rxNode = __pw2live.node_label; }
		}
		var lastSw  = fmtTs(s.last_switch);
		var lastTgt = s.last_target_label || s.last_target || '';
		var hDrops    = Number(s.health_drops            || 0);
		var hDropTs   = Number(s.health_last_drop_ts     || 0);
		var hLeaks    = Number(s.health_leaks            || 0);
		var hLeakTs   = Number(s.health_last_leak_ts     || 0);
		var hTransits = Number(s.health_transits         || 0);
		var hTransTs  = Number(s.health_last_transit_ts  || 0);
		var fbAction  = s.fallback_action                || 'blackhole';

		var rows = [];

		// Main Row 1: PassWall2
		rows.push(el('tr', null, [
			el('td', { 'class': 'lbl' }, 'PassWall2'),
			el('td', { 'class': 'val' }, el('span', { 'class': 'badge ' + pwSt[1] }, pwSt[0]))
		]));

		// Main Row 2: Watchdog
		rows.push(el('tr', null, [
			el('td', { 'class': 'lbl' }, 'Watchdog'),
			el('td', { 'class': 'val' }, el('span', { 'class': 'badge ' + wdSt[1] }, wdSt[0]))
		]));

		// Main Row 3: Proxy status (badge + subline with real exit IP/country)
		var proxyValCell = el('td', { 'class': 'val' });
		proxyValCell.appendChild(el('span', { 'class': 'badge ' + prSt[1] }, prSt[0]));
		if (rxIp) {
			var exitText = rxNode ? (rxNode + ' — ' + rxIp) : rxIp;
			proxyValCell.appendChild(el('div',
				{ 'style': 'margin-top:4px;font-size:0.92em;color:#999;' },
				exitText));
		}
		rows.push(el('tr', null, [
			el('td', { 'class': 'lbl' }, 'Proxy status'),
			proxyValCell
		]));

		var mainTbl = el('table', null, rows);

		// Mismatch warning disabled — real exit country now visible inline above.
		var mismatch = null;

		// Details: Last proxy check + Last node switch + 3 counters
		function counterCell(count, lastTs, severity) {
			if (count <= 0) {
				return el('span', { 'style': 'color:#3a9636;' }, '\u{1F7E2} 0');
			}
			var icon, color;
			if (severity === 'red')         { icon = '\u26A0\uFE0F'; color = '#c0392b'; }
			else if (severity === 'yellow') { icon = '\u26A0\uFE0F'; color = '#d4a017'; }
			else                            { icon = '\u{1F7E2}';   color = '#3a9636'; }
			var suffix = (count === 1 ? 'time' : 'times') + ' \u2014 last ' + fmtTs(lastTs);
			return el('span', { 'style': 'color:' + color + ';' }, [
				icon + ' ',
				el('b', null, String(count)),
				el('span', { 'style': 'font-weight:400;font-family:monospace;' }, ' ' + suffix)
			]);
		}

		var lastSwitchText = (Number(s.last_switch || 0) > 0)
			? (lastTgt ? (lastTgt + ' \u2014 ' + lastSw) : lastSw)
			: 'never';

		var dRows = [];
		if (s.proxy_check_enabled === '1') {
			dRows.push(el('tr', null, [
				el('td', { 'class': 'lbl' }, 'Last proxy check'),
				el('td', { 'class': 'val' }, fmtTs(s.proxy_check_ts))
			]));
		}
		dRows.push(el('tr', null, [
			el('td', { 'class': 'lbl' }, 'Last node switch'),
			el('td', { 'class': 'val' }, lastSwitchText)
		]));
		dRows.push(el('tr', null, [
			el('td', { 'class': 'lbl' }, 'Connection drops'),
			el('td', { 'class': 'val' }, counterCell(hDrops, hDropTs, 'red'))
		]));
		dRows.push(el('tr', null, [
			el('td', { 'class': 'lbl' }, 'Direct leaks'),
			el('td', { 'class': 'val' }, counterCell(hLeaks, hLeakTs,
				fbAction === 'direct' ? 'yellow' : 'red'))
		]));
		dRows.push(el('tr', null, [
			el('td', { 'class': 'lbl' }, 'Rotation transits'),
			el('td', { 'class': 'val' }, counterCell(hTransits, hTransTs, 'green'))
		]));

		var det = el('details', null, [
			el('summary', null, 'Details'),
			el('table', null, dRows)
		]);
		if (prevDetailsOpen) det.open = true;

		root.innerHTML = '';
		root.appendChild(mainTbl);
		if (mismatch) root.appendChild(mismatch);
		root.appendChild(det);

		document.getElementById('foot').textContent =
			'Last refresh: ' + new Date().toLocaleTimeString();
	}

	function renderError(msg) {
		var root = document.getElementById('root');
		root.innerHTML = '';
		root.appendChild(el('div', { 'class': 'err' }, 'Cannot fetch status: ' + msg));
	}

	function tick() {
		fetch(ENDPOINT, { cache: 'no-store' })
			.then(function(r) {
				if (!r.ok) throw new Error('HTTP ' + r.status);
				return r.json();
			})
			.then(function(s) {
				/* Refresh live-probe activity hint so adaptive timer can
				 * switch to 3s right after a node switch / pw2 restart. */
				__pw2live_hint = {
					last_switch:      Number(s.last_switch || 0),
					last_pw2_restart: Number(s.last_pw2_restart || 0)
				};
				render(s);
			})
			.catch(function(e) { renderError(e.message || String(e)); });
	}

	tick();
	setInterval(tick, REFRESH_MS);
	/* Kick off the live-probe loop independently. */
	probeOnce();
})();
</script>
</body>
</html>
